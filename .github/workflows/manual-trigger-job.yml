name: Manually trigger an Azure Machine Learning job

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group
        required: true
        type: string

      workspace_name:
        description: Azure Machine Learning workspace
        required: true
        type: string

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect checked-out repository
        run: |
          echo "Branch/ref: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          git log -1 --oneline

          echo "Current directory:"
          pwd

          echo "Contents of src/job.yml:"
          sed -n '1,160p' src/job.yml

          echo "Searching for invalid placeholders:"
          if grep -RIn --exclude-dir=.git \
            "uri_file_or_uri_folder" .; then
            echo "::error::An unresolved uri_file_or_uri_folder placeholder exists"
            exit 1
          fi

          echo "Checking training script:"
          test -f src/train-model-parameters.py

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure Machine Learning extension
        run: |
          az extension add --name ml --upgrade --yes

      - name: Validate Azure connection
        run: |
          az account show --output table

      - name: Run Azure Machine Learning training job
        run: |
          az ml job create \
            --file src/job.yml \
            --resource-group "${{ inputs.resource_group }}" \
            --workspace-name "${{ inputs.workspace_name }}" \
            --stream
